spring.application.name=Hotel_Buena_Vista

server.port=93

# formato de fecha/hora en logs
logging.pattern.dateformat=hh:mm

# eliminar banner de Spring en consola
spring.main.banner-mode=off

# desactivar cache de thymeleaf en desarrollo
spring.thymeleaf.cache=false

#local 
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_buena_vista
spring.datasource.username=root
spring.datasource.password= Roy150278

# #Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

