<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotel Buena Vista — Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { height: 100%; overflow: hidden; }

        /* ── Layout split ── */
        .auth-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        /* ── Panel izquierdo (imagen) ── */
        .auth-visual {
            position: relative;
            overflow: hidden;
        }
        .auth-visual-bg {
            position: absolute;
            inset: -8%;
            background:
                linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.20) 50%, rgba(0,0,0,.75) 100%),
                url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=1200&auto=format&fit=crop')
                center/cover no-repeat;
            animation: slowZoom 22s ease-in-out infinite alternate;
        }
        .auth-visual-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem;
        }
        .auth-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 300;
            color: #fff;
            text-decoration: none;
        }
        .auth-logo em { font-style: italic; color: var(--oro-claro); }

        .auth-visual-quote {
            max-width: 380px;
        }
        .auth-visual-quote blockquote {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.9rem;
            font-weight: 300;
            font-style: italic;
            color: #fff;
            line-height: 1.35;
            border: none;
            padding: 0;
            margin: 0 0 1rem;
        }
        .auth-visual-quote blockquote em { color: var(--oro-claro); }
        .auth-visual-quote cite {
            font-size: .7rem;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: rgba(255,255,255,.45);
            font-style: normal;
        }

        /* ── Panel derecho (formulario) ── */
        .auth-form-panel {
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem 4rem;
            overflow-y: auto;
            position: relative;
        }
        /* línea dorada top */
        .auth-form-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--oro) 40%, var(--oro) 60%, transparent);
        }

        .auth-form-inner { max-width: 400px; width: 100%; margin: 0 auto; }

        .auth-eyebrow {
            font-size: .65rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--oro);
            margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: .6rem;
        }
        .auth-eyebrow::before {
            content: ''; display: block;
            width: 28px; height: 1px;
            background: var(--oro);
        }

        .auth-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 300;
            color: #fff;
            line-height: 1.1;
            margin-bottom: .6rem;
        }
        .auth-title em { font-style: italic; color: var(--oro-claro); }

        .auth-subtitle {
            font-size: .88rem;
            color: rgba(255,255,255,.4);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* input con ícono */
        .input-icon-wrap {
            position: relative;
        }
        .input-icon-wrap i {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.25);
            font-size: .9rem;
            pointer-events: none;
            transition: color .25s;
        }
        .input-icon-wrap input {
            padding-left: 2.6rem !important;
        }
        .input-icon-wrap input:focus + i,
        .input-icon-wrap:focus-within i { color: var(--oro); }

        /* ícono toggle contraseña */
        .toggle-pass {
            position: absolute;
            right: 1rem; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.28);
            cursor: pointer;
            font-size: .9rem;
            transition: color .25s;
            z-index: 2;
        }
        .toggle-pass:hover { color: var(--oro); }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .custom-check {
            display: flex; align-items: center; gap: .5rem;
            cursor: pointer;
        }
        .custom-check input[type="checkbox"] {
            width: 14px; height: 14px;
            accent-color: var(--oro);
            cursor: pointer;
        }
        .custom-check span {
            font-size: .78rem;
            color: rgba(255,255,255,.4);
            letter-spacing: .02em;
        }

        .btn-login {
            width: 100%;
            font-family: 'Jost', sans-serif;
            font-size: .8rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            background: var(--oro);
            color: var(--oscuro);
            font-weight: 500;
            border: none;
            padding: 1rem;
            transition: background .3s, transform .2s;
            cursor: pointer;
            margin-bottom: 1.75rem;
        }
        .btn-login:hover { background: var(--oro-claro); transform: translateY(-2px); }

        .auth-divider {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1;
            height: 1px;
            background: rgba(255,255,255,.08);
        }
        .auth-divider span {
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: rgba(255,255,255,.25);
            white-space: nowrap;
        }

        .btn-social {
            width: 100%;
            font-family: 'Jost', sans-serif;
            font-size: .78rem;
            letter-spacing: .1em;
            background: transparent;
            color: rgba(255,255,255,.6);
            border: 1px solid rgba(255,255,255,.1);
            padding: .75rem;
            transition: border-color .3s, color .3s;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: .6rem;
            margin-bottom: .75rem;
        }
        .btn-social:hover { border-color: rgba(255,255,255,.3); color: #fff; }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .82rem;
            color: rgba(255,255,255,.3);
        }
        .auth-footer a { color: var(--oro); text-decoration: none; transition: color .25s; }
        .auth-footer a:hover { color: var(--oro-claro); }

        /* Responsive */
        @media (max-width: 900px) {
            html, body { overflow: auto; }
            .auth-page { grid-template-columns: 1fr; height: auto; }
            .auth-visual { height: 45vh; }
            .auth-form-panel { padding: 3rem 2rem; overflow-y: visible; }
        }
    </style>
</head>
<body>

<div class="side-accent"></div>

<div class="auth-page">

    <!-- ── PANEL VISUAL ── -->
    <div class="auth-visual">
        <div class="auth-visual-bg"></div>
        <div class="auth-visual-content">
            <a href="index.html" class="auth-logo">Hotel <em>Buena Vista</em></a>
            <div class="auth-visual-quote">
                <blockquote>
                    El lujo es saber<br><em>cuándo descansar</em>
                </blockquote>
                <cite>— Costa Rica · Desde 1998</cite>
            </div>
        </div>
    </div>

    <!-- ── PANEL FORMULARIO ── -->
    <div class="auth-form-panel">
        <div class="auth-form-inner">

            <div class="auth-eyebrow anim-1">Bienvenido de vuelta</div>
            <h1 class="auth-title anim-2">Iniciar<br><em>Sesión</em></h1>
            <p class="auth-subtitle anim-3">Accede a tu cuenta para gestionar reservas y preferencias.</p>

            <div class="anim-3">
                <!-- Email -->
                <div class="field-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-icon-wrap">
                        <input type="email" id="email" placeholder="tucorreo@ejemplo.com"/>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="field-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon-wrap">
                        <input type="password" id="password" placeholder="••••••••"/>
                        <i class="bi bi-lock"></i>
                        <span class="toggle-pass" onclick="togglePass()">
                            <i class="bi bi-eye" id="eye-icon"></i>
                        </span>
                    </div>
                </div>

                <!-- Opciones -->
                <div class="auth-options">
                    <label class="custom-check">
                        <input type="checkbox"> <span>Recordarme</span>
                    </label>
                    <a href="#" class="link-oro" style="font-size:.78rem;">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Botón principal -->
                <button class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>

                <!-- Divider -->
                <div class="auth-divider"><span>o continúa con</span></div>

                <!-- Social -->
                <button class="btn-social">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continuar con Google
                </button>

                <!-- Ir a registro -->
                <div class="auth-footer">
                    ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePass() {
        const input = document.getElementById('password');
        const icon  = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
